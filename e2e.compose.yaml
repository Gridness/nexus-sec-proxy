name: nexus-sec-proxy-e2e

x-scanner-cache-env: &scanner-cache-env
  TRIVY_CACHE_DIR: /var/cache/trivy
  GRYPE_DB_CACHE_DIR: /var/cache/grype/db

services:
  nexus-sec-proxy:
    image: nexus-sec-proxy:${NEXUS_SEC_PROXY_IMAGE_TAG:-local}
    build:
      context: .
      target: runtime
      args:
        RUST_VERSION: ${RUST_VERSION:-1.95}
        DEBIAN_VERSION: ${DEBIAN_VERSION:-bookworm}
        TRIVY_VERSION: ${TRIVY_VERSION:-0.71.0}
        GRYPE_VERSION: ${GRYPE_VERSION:-0.112.0}
        VERSION: ${NEXUS_SEC_PROXY_VERSION:-0.1.0}
        VCS_REF: ${NEXUS_SEC_PROXY_VCS_REF:-unknown}
        BUILD_DATE: ${NEXUS_SEC_PROXY_BUILD_DATE:-unknown}
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        delay: 10s
    init: true
    restart: unless-stopped
    depends_on:
      nexus:
        condition: service_healthy
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64m,mode=1777
    environment:
      <<: *scanner-cache-env
      HOME: /home/nonroot
      RUST_LOG: ${RUST_LOG:-nexus_sec_proxy=info}
      NEXUS_SEC_PROXY_BIND_ADDR: 0.0.0.0:3000
      NEXUS_SEC_PROXY_NEXUS_BASE_URL: ${NEXUS_SEC_PROXY_NEXUS_BASE_URL:-http://nexus:8081}
      NEXUS_SEC_PROXY_NEXUS_USERNAME: ${NEXUS_SEC_PROXY_NEXUS_USERNAME:-}
      NEXUS_SEC_PROXY_NEXUS_PASSWORD: ${NEXUS_SEC_PROXY_NEXUS_PASSWORD:-}
      NEXUS_SEC_PROXY_OSV_ECOSYSTEM_OVERRIDES: ${NEXUS_SEC_PROXY_OSV_ECOSYSTEM_OVERRIDES:-}
      NEXUS_SEC_PROXY_OSV_API_URL: ${NEXUS_SEC_PROXY_OSV_API_URL:-https://api.osv.dev/v1/query}
      NEXUS_SEC_PROXY_POLICY_FILE: ${NEXUS_SEC_PROXY_POLICY_FILE:-}
      NEXUS_SEC_PROXY_ADMIN_TOKEN: ${NEXUS_SEC_PROXY_ADMIN_TOKEN:-}
      NEXUS_SEC_PROXY_YANDEX_MESSENGER_TOKEN: ${NEXUS_SEC_PROXY_YANDEX_MESSENGER_TOKEN:-}
      NEXUS_SEC_PROXY_YANDEX_MESSENGER_TEMPLATE_FILE: ${NEXUS_SEC_PROXY_YANDEX_MESSENGER_TEMPLATE_FILE:-}
      NEXUS_SEC_PROXY_YANDEX_MESSENGER_API_URL: ${NEXUS_SEC_PROXY_YANDEX_MESSENGER_API_URL:-https://botapi.messenger.yandex.net}
      NEXUS_SEC_PROXY_YANDEX_MESSENGER_ENABLED: ${NEXUS_SEC_PROXY_YANDEX_MESSENGER_ENABLED:-}
      NEXUS_SEC_PROXY_LOG_JSON: ${NEXUS_SEC_PROXY_LOG_JSON:-false}
      NEXUS_SEC_PROXY_MINIMUM_BLOCKING_SEVERITY: ${NEXUS_SEC_PROXY_MINIMUM_BLOCKING_SEVERITY:-HIGH}
      NEXUS_SEC_PROXY_ALLOWED_VULNERABILITY_IDS: ${NEXUS_SEC_PROXY_ALLOWED_VULNERABILITY_IDS:-}
      NEXUS_SEC_PROXY_MAX_TOTAL_VULNERABILITIES: ${NEXUS_SEC_PROXY_MAX_TOTAL_VULNERABILITIES:-}
      NEXUS_SEC_PROXY_MAX_LOW_VULNERABILITIES: ${NEXUS_SEC_PROXY_MAX_LOW_VULNERABILITIES:-}
      NEXUS_SEC_PROXY_MAX_MEDIUM_VULNERABILITIES: ${NEXUS_SEC_PROXY_MAX_MEDIUM_VULNERABILITIES:-}
      NEXUS_SEC_PROXY_MAX_HIGH_VULNERABILITIES: ${NEXUS_SEC_PROXY_MAX_HIGH_VULNERABILITIES:-}
      NEXUS_SEC_PROXY_MAX_CRITICAL_VULNERABILITIES: ${NEXUS_SEC_PROXY_MAX_CRITICAL_VULNERABILITIES:-}
      NEXUS_SEC_PROXY_FAIL_OPEN: ${NEXUS_SEC_PROXY_FAIL_OPEN:-true}
      NEXUS_SEC_PROXY_UNSUPPORTED_TARGET_POLICY: ${NEXUS_SEC_PROXY_UNSUPPORTED_TARGET_POLICY:-allow}
      NEXUS_SEC_PROXY_CACHE_ALLOWED_TTL_SECS: ${NEXUS_SEC_PROXY_CACHE_ALLOWED_TTL_SECS:-86400}
      NEXUS_SEC_PROXY_CACHE_BLOCKED_TTL_SECS: ${NEXUS_SEC_PROXY_CACHE_BLOCKED_TTL_SECS:-3600}
      NEXUS_SEC_PROXY_CACHE_MAX_CAPACITY: ${NEXUS_SEC_PROXY_CACHE_MAX_CAPACITY:-100000}
      NEXUS_SEC_PROXY_REQUEST_TIMEOUT_SECS: ${NEXUS_SEC_PROXY_REQUEST_TIMEOUT_SECS:-30}
      NEXUS_SEC_PROXY_ARTIFACT_SCANNER: ${NEXUS_SEC_PROXY_ARTIFACT_SCANNER:-trivy}
      NEXUS_SEC_PROXY_ARTIFACT_SCANNER_COMMAND: ${NEXUS_SEC_PROXY_ARTIFACT_SCANNER_COMMAND:-trivy}
      NEXUS_SEC_PROXY_ARTIFACT_SCANNER_SKIP_DB_UPDATE: ${NEXUS_SEC_PROXY_ARTIFACT_SCANNER_SKIP_DB_UPDATE:-true}
      NEXUS_SEC_PROXY_ARTIFACT_SCANNER_OFFLINE: ${NEXUS_SEC_PROXY_ARTIFACT_SCANNER_OFFLINE:-true}
      NEXUS_SEC_PROXY_ARTIFACT_SCANNER_TIMEOUT_SECS: ${NEXUS_SEC_PROXY_ARTIFACT_SCANNER_TIMEOUT_SECS:-300}
      NEXUS_SEC_PROXY_ARTIFACT_SCAN_MAX_BYTES: ${NEXUS_SEC_PROXY_ARTIFACT_SCAN_MAX_BYTES:-536870912}
      NEXUS_SEC_PROXY_ARTIFACT_SCANNER_CONCURRENCY: ${NEXUS_SEC_PROXY_ARTIFACT_SCANNER_CONCURRENCY:-2}
      NEXUS_SEC_PROXY_ARTIFACT_TMP_DIR: /var/tmp/nexus-sec-proxy
    ports:
      - "${NEXUS_SEC_PROXY_PORT:-3000}:3000"
    volumes:
      - ${NEXUS_SEC_PROXY_POLICY_DIR:-./policy}:/etc/nexus-sec-proxy:ro
      - artifact-tmp:/var/tmp/nexus-sec-proxy
      - grype-cache:/var/cache/grype
      - trivy-cache:/var/cache/trivy
    healthcheck:
      test:
        [
          "CMD",
          "/busybox",
          "wget",
          "-q",
          "-O",
          "-",
          "http://127.0.0.1:3000/healthz",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  scanner-db-updater:
    image: nexus-sec-proxy-scanner-db-updater:${NEXUS_SEC_PROXY_IMAGE_TAG:-local}
    build:
      context: .
      target: scanner-db-updater
      args:
        DEBIAN_VERSION: ${DEBIAN_VERSION:-bookworm}
        TRIVY_VERSION: ${TRIVY_VERSION:-0.71.0}
        GRYPE_VERSION: ${GRYPE_VERSION:-0.112.0}
    deploy:
      replicas: 1
    init: true
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64m,mode=1777
    environment:
      <<: *scanner-cache-env
      HOME: /home/nonroot
      NEXUS_SEC_PROXY_SCANNER_DB_UPDATE_INTERVAL_SECS: ${NEXUS_SEC_PROXY_SCANNER_DB_UPDATE_INTERVAL_SECS:-21600}
      NEXUS_SEC_PROXY_SCANNER_DB_RETRY_INTERVAL_SECS: ${NEXUS_SEC_PROXY_SCANNER_DB_RETRY_INTERVAL_SECS:-300}
    volumes:
      - trivy-cache:/var/cache/trivy
      - grype-cache:/var/cache/grype
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  nexus:
    image: sonatype/nexus3:${NEXUS_OSS_IMAGE_TAG:-latest}
    init: true
    restart: unless-stopped
    ports:
      - "${NEXUS_OSS_PORT:-8081}:8081"
    volumes:
      - nexus-data:/nexus-data
    environment:
      INSTALL4J_ADD_VM_PARAMS: ${NEXUS_OSS_JAVA_OPTS:--Xms512m -Xmx1024m -XX:MaxDirectMemorySize=1024m}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://127.0.0.1:8081/",
        ]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 90s
    stop_grace_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  artifact-tmp:
  grype-cache:
  nexus-data:
  trivy-cache:
