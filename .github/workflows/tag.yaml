name: Publish new tag

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  tag:
    name: Tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Get current anicli version
        id: get_version
        shell: bash
        run: |
          VERSION=$(awk '
            /^\[workspace\.package\]$/ { in_workspace_package = 1; next }
            /^\[/ { in_workspace_package = 0 }
            in_workspace_package && $1 == "version" {
              gsub(/"/, "", $3)
              print $3
              exit
            }
          ' Cargo.toml)

          if [ -z "$VERSION" ]; then
            echo "Failed to read workspace.package.version from Cargo.toml" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create tag
        id: create_tag
        shell: bash
        run: |
          TAG="v${{ steps.get_version.outputs.version }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_exists
        shell: bash
        run: |
          if git show-ref --tags --verify --quiet "refs/tags/${{ steps.create_tag.outputs.tag }}"; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push tag
        if: steps.tag_exists.outputs.tag_exists == 'false'
        shell: bash
        run: |
          if [ -z "$TAG_PUSH_TOKEN" ]; then
            echo "TAG_PUSH_TOKEN secret is required so pushing the tag triggers the release workflow" >&2
            exit 1
          fi

          git tag "${{ steps.create_tag.outputs.tag }}"
          git push "https://x-access-token:${TAG_PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "${{ steps.create_tag.outputs.tag }}"
        env:
          TAG_PUSH_TOKEN: ${{ secrets.TAG_PUSH_TOKEN }}
